name: release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # create releases + upload assets

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      # Enforce the promotion path: local → alpha → beta → production.
      # A channel may only ship a build the channel below already shipped, on the
      # SAME commit. alpha is the entry point (its local gate is scripts/build.sh).
      # This makes "tag beta/stable directly" impossible — CI refuses it.
      - name: Enforce promotion path
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          # Only three tag shapes are valid: vX.Y.Z, vX.Y.Z-alpha.N, vX.Y.Z-beta.N.
          # Reject anything else (e.g. an off-book -rc.1) up front — such a tag would
          # be stamped Channel=beta by GoReleaser while the manifest step derives a
          # different channel, producing a self-inconsistent artifact no channel can
          # update to.
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-alpha\.[0-9]+|-beta\.[0-9]+)?$ ]]; then
            echo "::error::Invalid release tag $TAG — use vX.Y.Z, vX.Y.Z-alpha.N, or vX.Y.Z-beta.N."
            exit 1
          fi
          SHA="$(git rev-list -n1 "$TAG")"
          BASE="${TAG%%-*}"   # vX.Y.Z
          if [[ "$TAG" == *-alpha* ]]; then
            echo "alpha entry point — no predecessor required ($TAG @ $SHA)"; exit 0
          elif [[ "$TAG" == *-beta* ]]; then
            NEED="alpha"
          else
            NEED="beta"
          fi
          # Require a PUBLISHED predecessor RELEASE on the same commit — not just
          # a tag ref. A tag exists the instant it's pushed, regardless of whether
          # its release workflow succeeded; a failed -beta.1 that published nothing
          # must NOT unlock the stable tag. So for each candidate predecessor tag
          # on this SHA, confirm `gh release view` finds a non-draft release.
          FOUND=""
          for t in $(git tag -l "${BASE}-${NEED}.*"); do
            if [[ "$(git rev-list -n1 "$t")" != "$SHA" ]]; then continue; fi
            isDraft="$(gh release view "$t" --json isDraft -q .isDraft 2>/dev/null || echo missing)"
            if [[ "$isDraft" == "false" ]]; then FOUND="$t"; break; fi
            echo "note: predecessor tag $t exists but has no published release (state: $isDraft) — not accepted"
          done
          if [[ -z "$FOUND" ]]; then
            echo "::error::Promotion gate: $TAG needs a PUBLISHED $NEED release on commit $SHA first. Promote in order local → alpha → beta → production, re-tagging the SAME commit (e.g. tag the $NEED commit, wait for its release to publish, then this tag)."
            exit 1
          fi
          echo "promotion ok: $FOUND ($NEED release published, same commit) → $TAG"
        env:
          GH_TOKEN: ${{ github.token }}

      - uses: actions/setup-go@v5
        with: { go-version: "1.26" }

      - name: Gate (vet + test, arming OFF)
        run: |
          go vet ./...
          go test ./...

      - name: GoReleaser (build + publish binaries + checksums)
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Promotion re-tags the SAME commit up the channel chain, so a commit
          # can carry several tags (v0.4.0-beta.5 AND v0.4.0). GoReleaser's tag
          # auto-detection then grabs an arbitrary one — the first stable cut
          # picked the beta tag, republished into the existing beta release
          # (already_exists 422s), and would have stamped Channel=beta into
          # "stable" binaries. Pin it to the tag that triggered this run.
          GORELEASER_CURRENT_TAG: ${{ github.ref_name }}

      - name: Derive channel from tag
        id: chan
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" == *-alpha* ]]; then echo "channel=alpha" >>"$GITHUB_OUTPUT";
          elif [[ "$TAG" == *-beta* ]]; then echo "channel=beta" >>"$GITHUB_OUTPUT";
          else echo "channel=stable" >>"$GITHUB_OUTPUT"; fi

      - name: Sign manifest envelope
        env:
          CONSOLE_SIGN_KEY: ${{ secrets.CONSOLE_SIGN_KEY }}
        run: |
          go run ./cmd/signtool sign \
            --version "${GITHUB_REF_NAME}" \
            --channel "${{ steps.chan.outputs.channel }}" \
            --dir dist \
            --out console-manifest.json

      - name: Attach signed manifest to the release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF_NAME}" console-manifest.json --clobber
