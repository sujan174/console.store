version: 2
project_name: console-store

builds:
  - id: store
    main: ./cmd/store
    binary: store
    env: [CGO_ENABLED=0]
    goos: [darwin, linux, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X consolestore/internal/swiggy.liveOrdersDefault=1
      - -X consolestore/internal/version.Version={{ .Tag }}
      - -X consolestore/internal/version.Channel={{ if .Prerelease }}{{ if contains .Prerelease "alpha" }}alpha{{ else }}beta{{ end }}{{ else }}stable{{ end }}
      - -X consolestore/internal/version.Commit={{ .ShortCommit }}

# Flat, predictable asset names: store_<os>_<arch>[.exe] — matches updater.assetName().
archives:
  - id: raw
    formats: [binary]
    name_template: "store_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "SHA256SUMS"
  algorithm: sha256

release:
  github:
    owner: sujan174
    name: console.store
  prerelease: auto   # -alpha./-beta. tags marked prerelease automatically
  # The signed manifest is attached by the workflow (Task 13) via `extra_files`.

# Do NOT auto-generate a commit-list changelog into the release body. The body is
# the USER-FACING release notes you author per tag (left empty until you write it);
# the landing proxies it verbatim at /<channel>/notes/<tag> for the in-app
# "what's new" reader. See RELEASING.md → "Writing release notes".
changelog:
  disable: true

snapshot:
  version_template: "{{ .Tag }}-next"
