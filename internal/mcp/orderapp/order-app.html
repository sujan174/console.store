:root { ${Ds} }
@media (prefers-color-scheme: light) {
  :root { ${Ns} }
}
:root[data-theme="dark"] { ${Ds} }
:root[data-theme="light"] { ${Ns} }

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: ui-monospace, "SF Mono", "Cascadia Code", "JetBrains Mono", Menlo, Consolas, monospace;
  font-size: 14px;
  line-height: 1.4;
  color: var(--text-primary);
  background: var(--bg);
}
#app { padding: 14px; max-width: 480px; margin: 0 auto; }
button {
  font-family: inherit;
  font-size: 13px;
  font-weight: 400;
  color: var(--text-primary);
  background: transparent;
  border: 0.5px solid var(--border-strong);
  border-radius: var(--radius);
  padding: 6px 12px;
  cursor: pointer;
}
button:hover { border-color: var(--border-accent); }
button:disabled { cursor: not-allowed; opacity: .5; }
button:focus-visible { outline: 2px solid var(--border-accent); outline-offset: 1px; }
input {
  font-family: inherit;
  color: var(--text-primary);
}
.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  overflow: hidden;
  clip: rect(0 0 0 0);
  white-space: nowrap;
}
