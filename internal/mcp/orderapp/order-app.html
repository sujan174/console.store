  --bg:             var(--color-background-primary,   #1c1b18);

  --shadow: 0 1px 2px rgba(0, 0, 0, .20), 0 6px 20px rgba(0, 0, 0, .28);

  --sw-orange: #fc8019;

  --radius: 14px;
  --radius-sm: 10px;
  --pill: 999px;

  /* Kept for any leftover reference — now Swiggy orange, not the old blue. */
  --text-accent: var(--sw-orange);
  --border-accent: var(--sw-orange);
  --bg-accent: rgba(252, 128, 25, .12);

:root { ${Jb} ${ci} }
@media (prefers-color-scheme: light) {
  :root { ${Bs} }
}
@media (prefers-color-scheme: dark) {
  :root { ${ci} }
}
:root[data-theme="light"] { ${Bs} }
:root[data-theme="dark"] { ${ci} }

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--font-sans, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif);
  font-size: 14px;
  line-height: 1.4;
  color: var(--text-primary);
  background: var(--bg);
}
#app { padding: 16px; max-width: 480px; margin: 0 auto; }
/* Fullscreen has real width to spend on the home's sidebar layout. */
:root[data-display="fullscreen"] #app { max-width: 720px; }

.num {
  font-family: var(--font-mono, ui-monospace, "SF Mono", Menlo, Consolas, monospace);
  font-variant-numeric: tabular-nums;
}

input {
  font-family: inherit;
  color: var(--text-primary);
}
.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  overflow: hidden;
  clip: rect(0 0 0 0);
  white-space: nowrap;
}

/* --- buttons --- */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: inherit;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-primary);
  background: transparent;
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-sm);
  padding: 6px 12px;
  cursor: pointer;
  transition: transform .06s ease, background .15s ease, border-color .15s ease;
}
.btn:hover { border-color: var(--sw-orange); }
.btn:active { transform: scale(.97); }
.btn:disabled { cursor: not-allowed; opacity: .5; }
.btn:focus-visible { outline: 2px solid var(--ring); outline-offset: 2px; }

.btn-primary {
  background: var(--sw-orange);
  border-color: var(--sw-orange);
  color: var(--sw-on-orange);
  font-weight: 600;
  box-shadow: 0 1px 2px rgba(224, 109, 10, .25);
}
.btn-primary:hover { background: var(--sw-orange-press); border-color: var(--sw-orange-press); }

.btn-ghost { /* default .btn look; hover picks up the orange ring */ }

.btn-block { width: 100%; height: 44px; font-size: 15px; justify-content: center; }

/* --- category / segmented tabs --- */
.tabrow {
  display: flex;
  gap: 7px;
  overflow-x: auto;
  padding-bottom: 8px;
  scrollbar-width: thin;
}
.tab {
  cursor: pointer;
  font-family: inherit;
  font-size: 13px;
  padding: 6px 12px;
  border-radius: var(--pill);
  border: 1px solid var(--border-strong);
  background: transparent;
  color: inherit;
  white-space: nowrap;
  transition: background .15s ease, border-color .15s ease, color .15s ease;
}
.tab.on {
  color: var(--sw-orange);
  border-color: var(--sw-orange);
  background: rgba(252, 128, 25, .10);
  font-weight: 600;
}

/* --- store home layout (Task 7 scaffold; Tasks 8–10 fill the slots) --- */
.store-layout { display: flex; gap: 14px; }
.sidebar { width: 150px; flex: none; }
.content { flex: 1; min-width: 0; }
/* Narrow / inline-embed fallback — stack instead of side-by-side. */
:root[data-display="inline"] .store-layout { flex-direction: column; }
:root[data-display="inline"] .sidebar { width: auto; }

/* --- menu rows --- */
.tile {
  display: flex;
  align-items: center;
  gap: 11px;
  padding: 12px 0;
  border-top: 1px solid var(--border);
  transition: background .12s ease;
}
.tile:hover { background: color-mix(in srgb, var(--sw-orange) 4%, transparent); }

/* --- cards / surfaces --- */
.card {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 18px;
  box-shadow: var(--shadow);
}

.cartbar {
  position: sticky;
  bottom: 0;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 11px 14px;
  margin-top: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: var(--shadow);
}

/* --- stepper (qty +/-) --- */
.stepper {
  display: inline-flex;
  align-items: center;
  gap: 2px;
  border: 1px solid var(--sw-orange);
  border-radius: var(--pill);
  overflow: hidden;
  flex: none;
}
.stepper button {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border: 0;
  color: var(--sw-orange);
  background: rgba(252, 128, 25, .08);
  padding: 4px 11px;
  cursor: pointer;
  font-family: inherit;
}
.stepper button:focus-visible { outline: 2px solid var(--ring); outline-offset: -2px; }
.stepper .num { min-width: 14px; text-align: center; padding: 0 2px; }

/* --- segmented control / choice chips --- */
.seg, .chip {
  cursor: pointer;
  font-family: inherit;
  border: 1px solid var(--border-strong);
  background: transparent;
  color: inherit;
  transition: background .15s ease, border-color .15s ease, color .15s ease;
}
.seg {
  font-size: 13px;
  padding: 7px 12px;
  border-radius: var(--radius-sm);
  text-align: center;
}
.chip {
  font-size: 12px;
  padding: 5px 10px;
  border-radius: var(--pill);
}
.seg.on, .chip.on {
  color: var(--sw-orange);
  border-color: var(--sw-orange);
  background: rgba(252, 128, 25, .10);
  font-weight: 600;
}
.seg:focus-visible, .chip:focus-visible { outline: 2px solid var(--ring); outline-offset: 2px; }

/* --- veg / non-veg mark --- */
.veg {
  width: 15px;
  height: 15px;
  border-radius: 3px;
  border: 1.5px solid var(--veg);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  flex: none;
}
.veg span { width: 5px; height: 5px; border-radius: 50%; background: var(--veg); }
.veg--nonveg { border-color: var(--nonveg); }
.veg--nonveg span { background: var(--nonveg); }

.badge-soldout {
  font-size: 12px;
  background: var(--bg-danger);
  color: var(--text-danger);
  padding: 2px 8px;
  border-radius: var(--pill);
  flex: none;
}

/* --- bill rows --- */
.bill-row {
  display: flex;
  justify-content: space-between;
  padding: 4px 0;
  font-size: 14px;
  color: var(--text-secondary);
}
.bill-total {
  display: flex;
  justify-content: space-between;
  font-size: 16px;
  font-weight: 600;
  color: var(--text-primary);
  border-top: 1px solid var(--border);
  padding: 10px 0;
}

/* --- motion (CSS-only, reduced-motion guarded) --- */
@keyframes riseIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes spin { to { transform: rotate(360deg); } }
.cartbar { animation: riseIn .18s ease both; }
.stagger > * { animation: riseIn .22s ease both; animation-delay: calc(var(--i, 0) * 22ms); }
.card { animation: fadeIn .18s ease both; }
.spin { animation: spin 1s linear infinite; display: inline-block; }
@media (prefers-reduced-motion: reduce) {
