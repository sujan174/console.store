document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

rgba(158,206,106,.6);\">⊙ linked<\u002Fspan><span style=\"color:#3b3b5a;\"> · <\u002Fspan><span style=\"color:#565f89;\">{{ addrLine }} · home<\u002Fspan><span style=\"color:#3b3b5a;\"> · <\u002Fspan><span style=\"color:#565f89;\">{{ screenName }}<\u002Fspan><\u002Fspan>\n    <span><span style=\"color:#565f89;\">{{ statusHint }}<\u002Fspan><span style=\"color:#3b3b5a;\"> · ↑{{ latency }}ms <\u002Fspan><span style=\"color:#7aa2f7;animation:scblink 1.1s steps(1) infinite;\">▋<\u002Fspan><\u002Fspan>\n  <\u002Fdiv>\n\n  <!-- ========================= COFFEE RAIN (konami) ========================= -->\n  <sc-if value=\"{{ rain }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:absolute;inset:0;pointer-events:none;z-index:6;overflow:hidden;\">\n      <sc-for list=\"{{ rainDrops }}\" as=\"drop\" hint-placeholder-count=\"0\">\n        <span style=\"{{ drop.style }}\">{{ drop.char }}<\u002Fspan>\n      <\u002Fsc-for>\n      <div style=\"position:absolute;top:46px;left:50%;color:#9ece6a;text-shadow:0 0 16px rgba(158,206,106,.7);animation:toastin .4s ease-out both;background:#10111a;border:1px solid #2c2e44;border-radius:7px;padding:8px 18px;\">🎉 dev mode unlocked · free coffee incoming ☕<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- scanlines + vignette -->\n  <div style=\"position:absolute;inset:0;pointer-events:none;z-index:3;background:repeating-linear-gradient(0deg, rgba(0,0,0,0) 0px, rgba(0,0,0,0) 2px, rgba(0,0,0,.14) 3px);\"><\u002Fdiv>\n  <div style=\"position:absolute;inset:0;pointer-events:none;z-index:3;box-shadow:inset 0 0 200px 40px rgba(0,0,0,.55);\"><\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    const places = [\n      { id:'blue-tokai', name:'Blue Tokai', section:'coffee', eta:'35-45 min', fav:true, items:[\n        {id:'bt1', name:'Cold Coffee', price:149},\n        {id:'bt2', name:'Hazelnut Cold Brew', price VFRIDAY knocks ₹50 off — auto-applied.',\n      'tip: cold coffee pairs well with merge conflicts.',\n      'tip: `:` opens the command bar. yes, like vim.',\n    ];\n\n    this.state = {\n      screen:'splash', cat:'coffee', menuIdx:0, placeId:null, itemIdx:0,\n      cart:{}, cartPlaceId:null, cartIdx:0, flash:null,\n      order:null, trackStep:1, addrIdx:0, addr:this.addresses[0], addrOpen:false,\n      spin:0, tagIdx:0, latency:12.4, streak:7,\n      bootStep:0, cmdOpen:false, cmdText:'', cmdOut:[], rain:false, tipIdx:0,\n    };\n  }\n\n  componentDidMount(){\n    this._key = (e)=>this.onKey(e);\n    window.addEventListener('keydown', this._key);\n    this._spin = setInterval(()=>this.setState(s=>({spin:(s.spin+1)%10})), 110);\n    this._tag = setInterval(()=>this.setState(s=>({tagIdx:(s.tagIdx+1)%4, tipIdx:(s.tipIdx+1)%4})), 1600);\n    // boot sequence: reveal a line every 320ms, then hold and auto-connect\n    this._boot = setInterval(()=>this.setState(s=>{\n      if(s.screen!=='splash'){ clearInterval(this._boot); return {}; }\n      if(s.bootStep >= this.bootLines.length){\n        clearInterval(this._boot);\n        this._splash = setTimeout(()=>{ if(this.state.screen==='splash') this.setState({screen:'menu'}); }, 2400);\n        return {};\n      }\n      return {bootStep:s.bootStep+1};\n    }), 340);\n  }\n  componentWillUnmount(){\n    window.removeEventListener('keydown', this._key);\n    clearInterval(this._spin); clearInterval(this._tag); clearInterval(this._boot);\n    clearTimeout(this._splash); clearTimeout(this._flashT); clearInterval(this._track); clearTimeout(this._rain);\n  }\n\n  // ---- helpers ----\n  menuPlaces(){ return this.places.filter(p=>p.section===this.state.cat); }\n  curPlace(){ return this.places.find(p=>p.id===this.state.placeId); }\n  cartEntries(){ return Object.entries(this.state.cart).filter(([,q])=>q>0).map(([id,qty])=>({...this.byId[id], qty})); }\n  itemTotal(){ return this.cartEntries().reduce((s,e)=>s+e.price*e.qty,0); }\n  toPay(){ const it=this.itemTotal(); return it>0 ? it+29-50 : 0; }\n  cartPlace(){ return this.places.find(p=>p.id===this.state.cartPlaceId); }\n\n  flashAdd(id){\n    this.setState({flash:id});\n    clearTimeout(this._flashT);\n    this._flashT = setTimeout(()=>this.setState({flash:null}), 750);\n  }\n\n  addItem(it, placeId){\n    this.setState(s=>{\n      let cart = s.cart, cp = s.cartPlaceId;\n      if(cp && cp!==placeId){ cart = {}; }   // switch-restaurant: start fresh\n      cart = {...cart, [it.id]:(cart[it.id]||0)+1};\n      return {cart, cartPlaceId:placeId};\n    });\n    this.flashAdd(it.id);\n  }\n\n  goMenu(){ this.setState({screen:'menu'}); }\n\n  decItem(it){\n    this.setState(st=>{\n      const q=(st.cart[it.id]||0)-1;\n      const c={...st.cart};\n      if(q<=0) delete c[it.id]; else c[it.id]=q;\n      const cp = Object.keys(c).length? st.cartPlaceId : null;\n      return {cart:c, cartPlaceId:cp};\n    });\n  }\n\n  startTracking(){\n    this.setState({screen:'tracking', trackStep:1});\n    clearInterval(this._track);\n    this._track = setInterval(()=>this.setState(s=>{\n      if(s.trackStep>=3){ clearInterval(this._track); return {}; }\n      return {trackStep:s.trackStep+1};\n    }), 4200);\n  }\n\n  placeOrderNow(){\n    const place = this.cartPlace();\n    const id = '#SW'+Math.random().toString(16).slice(2,8).toUpperCase();\n    const total = this.toPay();\n    this.setState({ screen:'confirmed', order:{ id, placeName:place?place.name:'—', eta:'~40 min', total } });\n  }\n\n  triggerRain(){\n    this.setState({rain:true});\n    clearTimeout(this._rain);\n    this._rain = setTimeout(()=>this.setState({rain:false}), 4800);\n  }\n\n  // ---- easter-egg command bar ----\n  runCmd(raw){\n    const echo = {text:': '+raw, style:'color:#3b3b5a;'};\n    const G='color:#9ece6a;', B='color:#7aa2f7;', A='color:#e0af68;', D='color:#565f89;', T='color:#a9b1d6;', C='color:#7dcfff;', P='color:#bb9af7;';\n    const L=(text,style)=>({text, style:style||T});\n    const cmd = raw.toLowerCase().split(/\\s+/)[0];\n    let out = [];\n    let closeAfter = false;\n\n    if(cmd==='') { this.setState({cmdText:''}); return; }\n    else if(cmd==='clear' || cmd==='cls'){ return this.setState({cmdOut:[], cmdText:''}); }\n    else if(cmd==='help' || cmd==='?'){\n      out = [\n        L('commands —', A),\n        L('  neofetch   system info', D),\n        L('  coffee     brew one', D),\n        L('  whoami     who you are', D),\n        L('  streak     your morning run', D),\n        L('  uptime     server uptime', D),\n        L('  sl         choo choo', D),\n        L('  sudo …     go on, try it', D),\n        L('  vim        enter (you can leave)', D),\n        L('  42         the answer', D),\n        L('  clear      wipe screen · exit  close', D),\n      ];\n    }\n    else if(cmd==='neofetch'){\n      out = [\n        L('      ▟▙       guest@console.store', B),\n        L('     ▟██▙      ───────────────────', D),\n        L('     ▜██▛      host    bangalore · IN', T),\n        L('      ▜▛       uptime  3d 4h · load 0.07', T),\n        L('               online  247 devs ☕', T),\n        L('               shell   zsh · tokyo night', T),\n        L('               fav     cold coffee ×'+this.state.streak+' 🔥', A),\n      ];\n    }\n    else if(cmd==='coffee' || cmd==='brew'){\n      out = [ L('☕ brewing a virtual espresso …', A), L('done. caffeine +1. ship it.', G) ];\n    }\n    else if(cmd==='whoami'){\n      out = [ L('guest@hsr-layout', C), L('a developer with excellent taste and a '+this.state.streak+'-day cold coffee streak.', D) ];\n    }\n    else if(cmd==='streak'){\n      out = [ L('🔥 '+this.state.streak+'-day streak', A), L('cold coffee, every morning. don\\'t break the chain.', D) ];\n    }\n    else if(cmd==='uptime'){\n      out = [ L('up 3 days, 4:12 · 247 devs online · load avg 0.07 0.05 0.01', T) ];\n    }\n    else if(cmd==='sudo'){\n      out = [ L('guest is not in the sudoers file.', '#f7768e'), L('this incident will be reported. (to the barista.)', D) ];\n    }\n    else if(cmd==='vim' || cmd==='vi'){\n      out = [ L('entered vim.', T), L(':q  ✓ you left. unlike real vim, we let you go.', G) ];\n    }\n    else if(cmd==='sl'){\n      out = [ L('      ____', A), L('  ___/ ☕ |__   choo choo', A), L(' |_o____o_|_/   (you typed sl, didn\\'t you)', D) ];\n    }\n    else if(cmd==='42' || cmd==='answer'){\n      out = [ L('the answer to coffee, food and everything.', P) ];\n    }\n    else if(cmd==='theme'){\n      out = [ L('only one theme worth shipping: tokyo night.', B) ];\n    }\n    else if(cmd==='exit' || cmd==='quit' || cmd===':q'){\n      out = [ L('connection to console.store closed.', D) ];\n      closeAfter = true;\n    }\n    else if(cmd==='tip'){\n      out = [ L(this.tips[Math.floor(Math.random()*this.tips.length)], D) ];\n    }\n    else {\n      out = [ L('command not found: '+cmd+' — try `help`', '#f7768e') ];\n    }\n\n    this.setState(st=>({ cmdOut: [...st.cmdOut, echo, ...out].slice(-9), cmdText:'' }));\n    if(closeAfter){ setTimeout(()=>this.setState({cmdOpen:false}), 700); }\n  }\n\n  // ---- key handling ----\n  onKey(e){\n    const s = this.state;\n    const k = e.key;\n\n    // ---- command palette has focus ----\n    if(s.cmdOpen){\n      e.preventDefault();\n      if(k==='Escape') return this.setState({cmdOpen:false, cmdText:''});\n      if(k==='Enter') return this.runCmd(s.cmdText.trim());\n      if(k==='Backspace') return this.setState(st=>({cmdText:st.cmdText.slice(0,-1)}));\n      if(k.length===1 && !e.metaKey && !e.ctrlKey && !e.altKey) return this.setState(st=>({cmdText:st.cmdText+k}));\n      return;\n    }\n\n    // ---- konami buffer (only outside cmd) ----\n    if(s.screen!=='splash'){\n      this.kbuf.push(k); if(this.kbuf.length>10) this.kbuf.shift();\n      if(this.kbuf.join(',')===this.konami.join(',')){ this.kbuf=[]; this.triggerRain(); return; }\n    }\n\n    // ---- open command palette ----\n    if(k===':' && s.screen!=='splash'){ e.preventDefault(); return this.setState({cmdOpen:true, cmdText:''}); }\n\n    const nav = ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','j','k',' ','Enter','/'];\n    if(nav.includes(k)) e.preventDefault();\n\n    if(s.addrOpen){\n      if(k==='Escape') return this.setState({addrOpen:false});\n      if(k==='j'||k==='ArrowDown') return this.setState(st=>({addrIdx:Math.min(st.addrIdx+1,this.addresses.length-1)}));\n      if(k==='k'||k==='ArrowUp') return this.setState(st=>({addrIdx:Math.max(st.addrIdx-1,0)}));\n      if(k==='Enter') return this.setState(st=>({addr:this.addresses[st.addrIdx], addrOpen:false}));\n      return;\n    }\n\n    if(s.screen==='splash'){ return this.setState({screen:'menu'}); }\n\n    if(s.screen==='menu'){\n      const list = this.menuPlaces();\n      if(k==='j'||k==='ArrowDown') return this.setState({menuIdx:Math.min(s.menuIdx+1,list.length-1)});\n      if(k==='k'||k==='ArrowUp') return this.setState({menuIdx:Math.max(s.menuIdx-1,0)});\n      if(k==='ArrowRight'||k==='ArrowLeft'){ const cats=['coffee','food','snacks']; let i=cats.indexOf(s.cat); i=(i+(k==='ArrowRight'?1:cats.length-1))%cats.length; return this.setState({cat:cats[i], menuIdx:0}); }\n      if(k==='1') return this.setState({cat:'coffee', menuIdx:0});\n      if(k==='2') return this.setState({cat:'food', menuIdx:0});\n      if(k==='3') return this.setState({cat:'snacks', menuIdx:0});\n      if(k==='u'){ const bt=this.byId['bt1']; return this.addItem(bt,'blue-tokai'); }\n      if(k==='a') return this.setState({addrOpen:true, addrIdx:this.addresses.findIndex(a=>a.id===s.addr.id)});\n      if(k==='c') return this.setState({screen:'cart', cartIdx:0});\n      if(k==='Enter'){ const p=list[s.menuIdx]; if(p) return this.setState({screen:'restaurant', placeId:p.id, itemIdx:0}); }\n      return;\n    }\n\n    if(s.screen==='restaurant'){\n      const p = this.curPlace(); const items = p?p.items:[];\n      if(k==='j'||k==='ArrowDown') return this.setState({itemIdx:Math.min(s.itemIdx+1,items.length-1)});\n      if(k==='k'||k==='ArrowUp') return this.setState({itemIdx:Math.max(s.itemIdx-1,0)});\n      if(k==='Enter'||k==='ArrowRight'){ const it=items[s.itemIdx]; if(it) return this.addItem(it, p.id); }\n      if(k==='ArrowLeft'){ const it=items[s.itemIdx]; if(it) return this.decItem(it); }\n      if(k==='Escape') return this.setState({screen:'menu'});\n      if(k==='c') return this.setState({screen:'cart', cartIdx:0});\n      return;\n    }\n\n    if(s.screen==='cart'){\n      const rows = this.cartEntries();\n      if(k==='j'||k==='ArrowDown') return this.setState({cartIdx:Math.min(s.cartIdx+1,Math.max(rows.length-1,0))});\n      if(k==='k'||k==='ArrowUp') return this.setState({cartIdx:Math.max(s.cartIdx-1,0)});\n      if(k==='ArrowRight'||k==='+'||k==='='){ const r=rows[s.cartIdx]; if(r) return this.setState(st=>({cart:{...st.cart,[r.id]:st.cart[r.id]+1}})); }\n      if(k==='ArrowLeft'){ const r=rows[s.cartIdx]; if(r) return this.setState(st=>{ const q=st.cart[r.id]-1; const c={...st.cart}; if(q<=0) delete c[r.id]; else c[r.id]=q; return {cart:c, cartIdx:Math.max(0,Math.min(st.cartIdx,Object.keys(c).length-1))}; }); }\n      if(k==='-'||k==='_'){ const r=rows[s.cartIdx]; if(r) return this.setState(st=>{ const q=st.cart[r.id]-1; const c={...st.cart}; if(q<=0) delete c[r.id]; else c[r.id]=q; return {cart:c, cartIdx:Math.min(st.cartIdx,Object.keys(c).length-1>=0?Math.max(Object.keys(c).length-1,0):0)}; }); }\n      if(k==='x'){ const r=rows[s.cartIdx]; if(r) return this.setState(st=>{ const c={...st.cart}; delete c[r.id]; return {cart:c, cartIdx:Math.max(0,Math.min(st.cartIdx,Object.keys(c).length-1))}; }); }\n      if(k==='Enter'){ if(rows.length>0) return this.setState({screen:'checkout'}); }\n      if(k==='Escape') return this.setState({screen:'menu'});\n      return;\n    }\n\n    if(s.screen==='checkout'){\n      if(k==='Enter') return this.placeOrderNow();\n      if(k==='Escape') return this.setState({screen:'cart'});\n      return;\n    }\n\n    if(s.screen==='confirmed'){\n      if(k==='Enter'||k==='t') return this.startTracking();\n      if(k==='Escape'){ this.setState({screen:'menu', cart:{}, cartPlaceId:null, menuIdx:0, cat:'coffee'}); return; }\n      return;\n    }\n\n    if(s.screen==='tracking'){\n      if(k==='Escape'){ clearInterval(this._track); return this.setState({screen:'menu', cart:{}, cartPlaceId:null}); }\n      return;\n    }\n  }\n\n  renderVals(){\n    const s = this.state;\n    const spin = this.spinFrames[s.spin];\n    const cartTotal = this.itemTotal();\n    const screenNames = {splash:'connecting',menu:'menu',restaurant:s.placeId||'menu',cart:'cart',checkout:'checkout',confirmed:'order placed',tracking:'tracking'};\n\n    // menu rows\n    const list = this.menuPlaces();\n    const menuRows = list.map((p,i)=>{\n      const active = i===s.menuIdx;\n      return {\n        name:p.name, eta:p.eta, cursor:active?'❯':' ',\n        style: active\n          ? 'background:linear-gradient(90deg,#1f2335,#1c2030);margin:0 -36px;padding:2px 36px;border-left:2px solid #7aa2f7;color:#c0caf5;'\n          : 'padding:2px 0;color:#a9b1d6;',\n        onClick: ()=>this.setState({screen:'restaurant', placeId:p.id, itemIdx:0}),\n      };\n    });\n\n    // tabs\n    const mk = (id,label)=>({ label, style: s.cat===id?'color:#e0af68;text-shadow:0 0 12px rgba(224,175,104,.45);':'color:#565f89;', onClick:()=>this.setState({cat:id, menuIdx:0}) });\n    const tabs = [ mk('coffee','coffee'), mk('food','food'), mk('snacks','snacks') ];\n\n    // restaurant rows\n    const p = this.curPlace();\n    const itemRows = (p?p.items:[]).map((it,i)=>{\n      const active = i===s.itemIdx;\n      const qty = s.cart[it.id]||0;\n      const inCart = qty>0;\n      let style;\n      if(active) style='background:linear-gradient(90deg,#1f2335,#1c2030);margin:0 -36px;padding:2px 36px;border-left:2px solid #7aa2f7;color:#c0caf5;';\n      else if(inCart) style='margin:0 -36px;padding:2px 36px;border-left:2px solid #9ece6a;color:#a9b1d6;';\n      else style='padding:2px 0;color:#a9b1d6;';\n      return {\n        name:it.name, price:'₹'+it.price, tag: it.tag||'',\n        cursor: active?'❯':' ',\n        check: inCart?'✓':' ',\n        nameStyle: inCart?'color:#c0caf5;':'color:#a9b1d6;',\n        qtyLabel: '×'+qty,\n        qtyStyle: inCart?'display:inline-flex;gap:12px;align-items:baseline;':'display:none;',\n        inc: (e)=>{ if(e&&e.stopPropagation) e.stopPropagation(); this.addItem(it, p.id); },\n        dec: (e)=>{ if(e&&e.stopPropagation) e.stopPropagation(); this.decItem(it); },\n        style,\n        onClick: ()=>this.addItem(it, p.id),\n      };\n    });\n\n    // cart rows\n    const entries = this.cartEntries();\n    const cartRows = entries.map((e,i)=>{\n      const active = i===s.cartIdx;\n      return {\n        name:e.name, qty:'x'+e.qty, total:'₹'+(e.price*e.qty), cursor:active?'❯':' ',\n        style: active\n          ? 'background:linear-gradient(90deg,#1f2335,#1c2030);margin:0 -36px;padding:2px 36px;border-left:2px solid #7aa2f7;color:#c0caf5;'\n          : 'padding:2px 0;color:#a9b1d6;',\n        onClick: ()=>this.setState({cartIdx:i}),\n      };\n    });\n    const cartPlace = this.cartPlace();\n\n    // tracking rows\n    const steps = ['order confirmed','preparing …','out for delivery','delivered'];\n    const trackRows = steps.map((label,i)=>{\n      let mark, markStyle, labelStyle;\n      if(i<s.trackStep){ mark='●'; markStyle='color:#9ece6a;text-shadow:0 0 10px rgba(158,206,106,.6);'; labelStyle='color:#a9b1d6;'; }\n      else if(i===s.trackStep){ mark=spin; markStyle='color:#e0af68;text-shadow:0 0 10px rgba(224,175,104,.6);'; labelStyle='color:#c0caf5;'; }\n      else { mark='○'; markStyle='color:#3b3b5a;'; labelStyle='color:#565f89;'; }\n      return {mark, markStyle, label, labelStyle};\n    });\n\n    // address rows\n    const addrRows = this.addresses.map((a,i)=>{\n      const active = i===s.addrIdx;\n      return {\n        line:a.line, label:a.label, cursor:active?'❯':' ',\n        style: active ? 'background:#1f2335;margin:0 -10px;padding:1px 10px;color:#c0caf5;' : 'padding:1px 0;color:#a9b1d6;',\n        onClick: ()=>this.setState({addr:this.addresses[i], addrOpen:false}),\n      };\n    });\n\n    const order = s.order || {};\n\n    // boot sequence\n    const bootDone = s.bootStep >= this.bootLines.length;\n    const bootRows = this.bootLines.slice(0, s.bootStep).map(l=>({ text:l.text, style:'color:'+l.c+';' }));\n\n    // tracking map progress\n    const trackPct = Math.round(Math.min(s.trackStep,3)/3*100)+'%';\n    const quips = ['picking up your order','weaving through traffic','almost at your gate','knock knock'];\n    const riderQuip = quips[Math.min(s.trackStep,3)];\n\n    // status bar rotating hint\n    const statusHints = ['type : for commands','247 devs online','DEVFRIDAY −₹50','ssh console.store'];\n\n    return {\n      isSplash:s.screen==='splash', isMenu:s.screen==='menu', isRestaurant:s.screen==='restaurant',\n      isCart:s.screen==='cart', isCheckout:s.screen==='checkout', isConfirmed:s.screen==='confirmed',\n      isTracking:s.screen==='tracking', addrOpen:s.addrOpen,\n      tagline:this.taglines[s.tagIdx], spin,\n      bootPhase: s.screen==='splash' && !bootDone, showLogo: s.screen==='splash' && bootDone,\n      bootRows, bootSpin: spin, bootNow: bootDone?'':'establishing session …',\n      cartTotal, addrLine:s.addr.line, screenName:screenNames[s.screen]||s.screen, latency:s.latency.toFixed(1),\n      statusHint: statusHints[s.tipIdx % statusHints.length], streak:s.streak,\n      menuRows, tabs, orderUsual:()=>{ const bt=this.byId['bt1']; this.addItem(bt,'blue-tokai'); },\n      rName: p?p.name.toLowerCase():'', rEta: p?p.eta:'', itemRows,\n      cartRows, cartEmpty:entries.length===0, cartHasItems:entries.length>0,\n      cartPlaceName: cartPlace?cartPlace.name:'—', cartEta: cartPlace?('~'+cartPlace.eta.split('-')[1]):'',\n      billItem:'₹'+this.itemTotal(), billDelivery:'₹29', billTotal:'₹'+this.toPay(),\n      coAddr: s.addr.line+' · '+s.addr.label, coFrom: (cartPlace?cartPlace.name:'—')+' · ~40 min',\n      placeOrder:()=>this.placeOrderNow(),\n      confPlace:order.placeName, confEta:order.eta, confId:order.id,\n      trackRows, trackEta:'~32 min', rider:'KA 05 1234', trackPct, riderQuip,\n      addrRows,\n      cmdOpen:s.cmdOpen, cmdText:s.cmdText, cmdOut:s.cmdOut, rain:s.rain, rainDrops:this.rainDrops,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
